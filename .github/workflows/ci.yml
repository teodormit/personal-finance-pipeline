# GitHub Actions CI workflow.
# Runs the pytest suite on every push and pull request.
#
# Integration tests in test_base_loader_integration.py auto-skip when
# Postgres is not reachable (it isn't on the CI runner), so only the
# pure-unit tests execute here. That's intentional — CI proves the
# scoring formulas and loader contracts are correct in isolation.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
