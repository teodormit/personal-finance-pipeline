# =============================================================================
# Personal Finance Pipeline — Docker Compose topology
# =============================================================================
# Two services:
#   1. postgres  — long-lived data warehouse (the actual "product").
#   2. pipeline  — one-shot ETL runner. Built locally from ./Dockerfile.
#
# Typical usage:
#   docker compose up -d postgres
#   docker compose run --rm pipeline python scripts/migrate.py --status
#   docker compose run --rm pipeline python scripts/run_pipeline.py --mode incremental
#
# MinIO was removed (Phase A.5) — not used by the pipeline. Re-add when
# Phase D / object-storage work begins.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # 1. The Data Warehouse: PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    container_name: postgres_container
    image: postgres:17
    env_file:
      - .env
    environment:
      POSTGRES_DB: finance_warehouse
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./logs/postgres:/var/log/postgresql
      - ./config/postgres/postgres.conf:/etc/postgresql/postgresql.conf
      # Uncomment and provide if you have a pg_hba.conf file
      # - ./config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
      # Database initialization scripts (runs only on first init of a fresh volume)
      - ./scripts/sql/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      # FIXED (Phase A.5): was checking -d personal_finance which doesn't exist.
      # Now uses the real database name so the pipeline's depends_on actually triggers.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data_platform_network

  # ---------------------------------------------------------------------------
  # 2. The ETL Pipeline (one-shot — built locally from ./Dockerfile)
  # ---------------------------------------------------------------------------
  # Invoked via:
  #     docker compose run --rm pipeline python scripts/run_pipeline.py ...
  #     docker compose run --rm pipeline python scripts/migrate.py ...
  # The `--rm` removes the exited container; Postgres keeps running.
  # ---------------------------------------------------------------------------
  pipeline:
    container_name: pipeline_runner
    image: personal-finance-pipeline:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      # Inside the docker network, Postgres resolves by service name, not localhost.
      # This override is exactly what makes the host-dev path AND the container
      # path coexist: .env keeps localhost (for host Python), compose overrides
      # to "postgres" (for in-container Python).
      POSTGRES_HOST: postgres
      # Force Sofia time so datetime.now() in run_pipeline.py matches the host's
      # idea of "today". Without this the container would default to UTC.
      TZ: Europe/Sofia
    # Lets Docker handle SIGTERM forwarding & zombie reaping without needing
    # tini inside the image.
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # The host directories the pipeline reads from / writes to.
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    networks:
      - data_platform_network
    # No `ports:` — this is a one-shot job, nothing to expose externally.
    # No `restart:` — one-shot containers exit on success; restarting would loop.

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  # minio_data volume removed (Phase A.5). The on-disk Docker volume
  # `personal-finance-pipeline_minio_data` persists until manually pruned,
  # so reattaching it later (if MinIO returns) is non-destructive.

# =============================================================================
# Networks
# =============================================================================
networks:
  data_platform_network:
    driver: bridge
